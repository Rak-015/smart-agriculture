{% extends "base2.html" %}

{% block main %}

<style>
    body{
        background-image: url('/static/img/image.png');
        background-repeat: no-repeat;
        background-size: cover;
    }
</style>

<!-- Container for layout with sidebar -->
<div class="container-fluid">
    <div class="row">
       
        
        <!-- Main content section -->
        <div class="col-md-9" style=" padding: 30px;">
            <div>
                <center>
                    <h2>View All Soil Prediction History</h2>
                    {% if soil %}
                        <table class="table table-striped table-bordered" style="width: 80%; margin-top: 20px; animation: fadeIn 1.5s ease-in;">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                     <th>Date</th>
                                    <th>Result</th>
                                    <th>Fertilizer</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for ss in soil %}
                                    <tr>
                                        <td>{{ ss.id }}</td>
                                        <td>{{ ss.created }}</td>
                                        <td>{{ ss.prediction }}</td>
                                        <td>{{ ss.fertilizer }}</td>
                                    </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    {% else %}
                        <p>No users found.</p>
                    {% endif %}
                </center>
            </div>
        </div>
    </div>
</div>

<style>
    /* Adding some modern styles */
    .sidebar {
        position: fixed;
        height: 100%;
        width: 250px;
        left: 0;
        top: 0;
        z-index: 100;
        border-right: 2px solid #34495e;
    }

    .sidebar ul {
        padding-top: 40px;
    }

    .sidebar ul li a {
        display: block;
        padding: 10px;
        color: #fff;
        text-decoration: none;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }

    .sidebar ul li a:hover {
        background-color: #34495e;
    }

    .container-fluid {
        margin-left: 250px;
        padding-top: 30px;
    }

    /* Background style for the main content */
    .col-md-9 {
      
        border-radius: 10px;
    }

    /* Simple fade-in animation for the table */
    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    /* Table style */
    table {
        background-color: #2980b9;
        width: 100%;
        margin: 20px auto;
        border-collapse: collapse;
        color: #ecf0f1;
    }

    table th, table td {
        text-align: center;
        padding: 12px;
    }

    table th {
        background-color: #2980b9;
        color: white;
    }

    table td {
        background-color: #ecf0f1;
        font-size: 14px;
    }
</style>

{% endblock %}
